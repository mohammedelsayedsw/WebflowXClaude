<svg xmlns="http://www.w3.org/2000/svg" width="330" height="56" viewBox="0 0 330 56" fill="#0d1230" role="img" aria-label="Magento Association Gold Member">
  <!-- Magento hexagon bug -->
  <g transform="translate(3,3)">
    <!-- outer hexagon outline -->
    <path d="M24 0 L46 12.7 V37.3 L24 50 L2 37.3 V12.7 Z" fill="none" stroke="#0d1230" stroke-width="3.4"/>
    <!-- center thin pillar (top) -->
    <rect x="22.4" y="6" width="3.2" height="14" />
    <!-- left and right pillars forming the U -->
    <path d="M13.8 12.5 h4.2 V34 h-4.2 Z" />
    <path d="M30 12.5 h4.2 V34 h-4.2 Z" />
    <!-- base of the U -->
    <path d="M13.8 31.5 h20.4 v4.2 h-20.4 Z" />
  </g>
  <!-- Wordmark -->
  <text x="60" y="25" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Magento Association</text>
  <text x="60" y="47" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Gold Member</text>
</svg>
